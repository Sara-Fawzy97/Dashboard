<div class="p-6 max-w-lg bg-white">
 <button 
    mat-dialog-close
    class="absolute top-4 right-4 text-gray-400 hover:text-black text-xl">
    ✕
  </button>

<h2 class="text-xl font-bold mb-4">
    {{product.title}}
  </h2>
  <!-- Edit Mode -->
<div *ngIf="editMode">

<input
[(ngModel)]="product.title"
class="border p-2 w-full mb-2"
/>

<input
[(ngModel)]="product.price"
class="border p-2 w-full mb-2"
/>

<textarea
[(ngModel)]="product.description"
class="border p-2 w-full"
></textarea>

</div>

  

  <!--View mode----->
<div *ngIf="!editMode">
  <div class="grid grid-cols-5 gap-4">

  <!-- الصور الصغيرة -->
  <div class="flex flex-col gap-2">
    <img
      *ngFor="let img of product.images"
      [src]="img"
      (click)="selectedImage = img"
      class="w-16 h-16 object-cover rounded-lg cursor-pointer border hover:border-blue-500"
    />
  </div>

  <!-- الصورة الكبيرة -->
  <div class="col-span-4 bg-gray-100 rounded-xl p-4 flex justify-center">
    <img
      [src]="selectedImage || product.thumbnail"
      class="h-64 object-contain"
    />
  </div>

</div>
  <div class="flex">
   <span *ngFor="let tag of product.tags" class="bg-blue-100 text-xs font-medium mr-2 px-2.5 py-0.5 rounded-2xl mb-2" >{{ tag }}</span>
  </div>

  <p class="text-gray-600 mb-4">
    {{product.description}}
  </p>

  <div class="grid grid-cols-3 gap-4 text-center">

    <div class="bg-gray-100 p-3 rounded">
      <p class="font-bold text-blue-600">
        ${{product.price}}
      </p>
      <p class="text-sm text-gray-500">Price</p>
    </div>

    <div class="bg-gray-100 p-3 rounded">
      <p class="font-bold">
        {{product.stock}}
      </p>
      <p class="text-sm text-gray-500">In Stock</p>
    </div>

    <div class="bg-gray-100 p-3 rounded">
      <p class="font-bold text-yellow-500">
        ⭐ {{product.rating}}
      </p>
      <p class="text-sm text-gray-500">Rating</p>
    </div>

  </div>
</div>
  
  
<div class="flex gap-3 mt-6">

<button
class="bg-blue-500 text-white px-4 py-2 rounded"
(click)="enableEdit()"
*ngIf="!editMode"
>
Edit
</button>

<button
class="bg-green-500 text-white px-4 py-2 rounded"
(click)="editProduct()"
*ngIf="editMode"
>
Save
</button>

<button
class="bg-red-500 text-white px-4 py-2 rounded"
(click)="deleteProduct()"
>
Delete
</button>

</div>

</div>
