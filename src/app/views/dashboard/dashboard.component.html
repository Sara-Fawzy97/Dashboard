<div>
    <h1 *ngIf="show" @fadeIn class="text-2xl font-bold mb-4">Dashboard</h1>
    <p class="text-gray-600 mb-6">Welcome to your dashboard! Here you can find an overview of your activities and statistics.</p>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
  <mat-card *ngIf="show" @fadeIn  class="shadow-lg hover:shadow-xl transition duration-300 ">
    <mat-card-header>
      <mat-card-title>Total Products</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p class="text-3xl font-bold text-blue-600">
        {{ totalProducts }}
      </p>
    </mat-card-content>
  </mat-card>

  <mat-card @fadeIn  class="shadow-lg hover:shadow-xl transition duration-300 rounded-2xl">
    <mat-card-header>
      <mat-card-title>Total Users</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p class="text-3xl font-bold text-green-600">
        {{ totalUsers }}
      </p>
    </mat-card-content>
  </mat-card>

</div>

<mat-card class="p-6 shadow-lg rounded-2xl">
  <canvas  id="revenueChart"></canvas>
</mat-card>
